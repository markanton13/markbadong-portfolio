<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#f4f0e8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Page Not Found | Mark Anton</title>
    <style>
      :root {
        font-family: "DM Sans", system-ui, sans-serif;
        color: #171714;
        background: #f4f0e8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        padding: clamp(34px, 7vw, 72px);
        border: 1px solid rgba(23, 23, 20, 0.14);
        border-radius: 32px;
        background: #fffdf8;
        box-shadow: 0 28px 80px rgba(47, 39, 25, 0.10);
      }
      .eyebrow {
        margin: 0 0 18px;
        color: #3157d5;
        text-transform: uppercase;
        letter-spacing: .16em;
        font-size: 12px;
        font-weight: 800;
      }
      h1 {
        margin: 0;
        font-family: Manrope, system-ui, sans-serif;
        font-size: clamp(44px, 8vw, 76px);
        line-height: 1;
        letter-spacing: -.045em;
      }
      p:not(.eyebrow) {
        max-width: 620px;
        margin: 28px 0 0;
        color: #69665f;
        font-size: 18px;
        line-height: 1.7;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 15px 21px;
        border: 1px solid rgba(23, 23, 20, 0.14);
        border-radius: 14px;
        color: inherit;
        text-decoration: none;
        font-weight: 700;
      }
      a:first-child {
        border-color: #171714;
        background: #171714;
        color: white;
      }
      a:focus-visible {
        outline: 3px solid #fffdf8;
        outline-offset: 3px;
        box-shadow: 0 0 0 6px #3157d5;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Error 404</p>
      <h1>That page doesn’t exist.</h1>
      <p>The link may be incomplete, outdated, or mistyped. Return to Mark Anton’s portfolio or open the published project work.</p>
      <nav aria-label="Not found navigation">
        <a href="/">Return home</a>
        <a href="/#work">Explore selected work</a>
      </nav>
    </main>
  </body>
</html>
